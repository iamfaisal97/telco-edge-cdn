<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Telco-Edge CDN Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f1117; color: #e0e0e0; }
        
        header {
            background: linear-gradient(135deg, #1a1f2e, #2d3561);
            padding: 20px 30px;
            border-bottom: 2px solid #3d5af1;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 { font-size: 24px; color: #ffffff; }
        header span { font-size: 13px; color: #8892b0; }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 20px;
            padding: 24px;
        }
        
        .card {
            background: #1a1f2e;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #2a2f45;
        }
        .card h2 {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #3d5af1;
            margin-bottom: 16px;
        }

        /* Edge Status */
        .edge-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .edge-node {
            background: #0f1117;
            border-radius: 8px;
            padding: 12px;
            border: 1px solid #2a2f45;
        }
        .edge-node h3 { font-size: 13px; color: #8892b0; margin-bottom: 8px; }
        .video-pill {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 11px;
            margin: 2px;
            background: #2d3561;
            color: #a8b2d8;
        }
        .video-pill.hit { background: #1a3a2a; color: #4caf50; }

        /* Popularity */
        .popularity-item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            gap: 10px;
        }
        .popularity-label { width: 120px; font-size: 13px; color: #8892b0; }
        .bar-container { flex: 1; background: #0f1117; border-radius: 4px; height: 8px; }
        .bar { height: 8px; border-radius: 4px; background: #3d5af1; transition: width 0.5s; }
        .popularity-count { font-size: 13px; color: #a8b2d8; width: 40px; text-align: right; }

        /* ML Predictions */
        .spike-item {
            background: #0f1117;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
            border-left: 3px solid #ff6b6b;
        }
        .spike-item.no-spike { border-left-color: #4caf50; }
        .spike-video { font-size: 14px; font-weight: bold; }
        .spike-detail { font-size: 12px; color: #8892b0; margin-top: 4px; }
        .spike-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            background: #ff6b6b22;
            color: #ff6b6b;
            float: right;
        }
        .spike-badge.safe { background: #4caf5022; color: #4caf50; }

        /* Pre-cache Log */
        .log-item {
            font-size: 12px;
            padding: 6px 0;
            border-bottom: 1px solid #2a2f45;
            color: #8892b0;
        }
        .log-item span { color: #3d5af1; }

        /* Analytics */
        .stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .stat-box {
            background: #0f1117;
            border-radius: 8px;
            padding: 14px;
            text-align: center;
        }
        .stat-value { font-size: 28px; font-weight: bold; color: #3d5af1; }
        .stat-label { font-size: 11px; color: #8892b0; margin-top: 4px; }

        /* Video Player */
        .video-select { width: 100%; padding: 8px; background: #0f1117; border: 1px solid #2a2f45; color: #e0e0e0; border-radius: 6px; margin-bottom: 10px; }
        .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; margin-right: 8px; }
        .btn-primary { background: #3d5af1; color: white; }
        .btn-secondary { background: #2a2f45; color: #a8b2d8; }
        video { width: 100%; border-radius: 8px; margin-top: 10px; background: #000; max-height: 200px; }

        .refresh-time { font-size: 11px; color: #8892b0; text-align: right; margin-top: 8px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #4caf50; display: inline-block; margin-right: 6px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
</head>
<body>

<header>
    <div>
        <h1>🌐 Telco-Edge CDN Dashboard</h1>
        <span><span class="status-dot"></span>Live System Monitor — University of Oulu</span>
    </div>
    <span id="clock" style="color:#a8b2d8; font-size:14px;"></span>
</header>

<div class="grid">

    <!-- Edge Cache Status -->
    <div class="card">
        <h2>📦 Edge Cache Status</h2>
        <div class="edge-grid" id="edgeStatus">Loading...</div>
        <div class="refresh-time" id="edgeRefresh"></div>
    </div>

    <!-- Popularity Rankings -->
    <div class="card">
        <h2>🔥 Video Popularity</h2>
        <div id="popularityList">Loading...</div>
        <div class="refresh-time" id="popRefresh"></div>
    </div>

    <!-- ML Predictions -->
    <div class="card">
        <h2>🤖 ML Spike Predictions</h2>
        <div id="predictionList">Loading...</div>
        <div class="refresh-time" id="predRefresh"></div>
    </div>

    <!-- Analytics Stats -->
    <div class="card">
        <h2>📊 System Analytics</h2>
        <div class="stat-grid" id="analyticsStats">Loading...</div>
        <div class="refresh-time" id="analyticsRefresh"></div>
    </div>

    <!-- Pre-cache Log -->
    <div class="card">
        <h2>⚡ Pre-cache Events</h2>
        <div id="precacheLog">Loading...</div>
        <div class="refresh-time" id="precacheRefresh"></div>
    </div>

    <!-- Video Player -->
    <div class="card">
        <h2>▶ Video Player</h2>
        <select class="video-select" id="videoSelect"></select>
        <div>
            <button class="btn btn-primary" onclick="loadVideo()">Play via Edge</button>
            <button class="btn btn-secondary" onclick="triggerPrecache()">⚡ Pre-cache Now</button>
        </div>
        <video id="player" controls></video>
        <div id="playerStatus" style="font-size:12px; color:#8892b0; margin-top:6px;"></div>
    </div>

</div>

<script>
    const EDGE = 'http://localhost:5001';
    const CORE = 'http://localhost:5000';
    const ANALYTICS = 'http://localhost:5010';

    // Clock
    setInterval(() => {
        document.getElementById('clock').textContent = new Date().toLocaleTimeString();
    }, 1000);

    // ── Edge Cache Status ──
    async function loadEdgeStatus() {
        const edges = [
            { id: 'edge1', url: 'http://localhost:5001' },
            { id: 'edge2', url: 'http://localhost:5002' },
            { id: 'edge3', url: 'http://localhost:5003' },
        ];

        let html = '';
        for (const edge of edges) {
            try {
                const res = await fetch(`${edge.url}/cache-status`);
                const data = await res.json();
                const videos = Object.entries(data.cached_videos || {});
                html += `<div class="edge-node">
                    <h3>${edge.id.toUpperCase()} <span style="color:#4caf50; font-size:10px;">● online</span></h3>
                    ${videos.map(([v, score]) => `<span class="video-pill hit" title="score: ${score}">${v.replace('.mp4','')}</span>`).join('') || '<span style="color:#555; font-size:12px;">empty</span>'}
                    <div style="font-size:10px; color:#555; margin-top:6px;">${videos.length}/${data.max_cache_size} slots used</div>
                </div>`;
            } catch {
                html += `<div class="edge-node"><h3>${edge.id} <span style="color:#ff6b6b; font-size:10px;">● offline</span></h3></div>`;
            }
        }
        document.getElementById('edgeStatus').innerHTML = html;
        document.getElementById('edgeRefresh').textContent = `Updated: ${new Date().toLocaleTimeString()}`;
    }

    // ── Popularity ──
    async function loadPopularity() {
        try {
            const res = await fetch(`${EDGE}/popularity`);
            const data = await res.json();
            const videos = data.top_videos || [];
            const max = videos[0]?.requests || 1;

            document.getElementById('popularityList').innerHTML = videos.map(v => `
                <div class="popularity-item">
                    <span class="popularity-label">${v.video.replace('.mp4','')}</span>
                    <div class="bar-container"><div class="bar" style="width:${(v.requests/max*100)}%"></div></div>
                    <span class="popularity-count">${v.requests}</span>
                </div>
            `).join('') || '<span style="color:#555">No data yet</span>';
            document.getElementById('popRefresh').textContent = `Updated: ${new Date().toLocaleTimeString()}`;
        } catch(e) { document.getElementById('popularityList').innerHTML = '<span style="color:#555">Error loading</span>'; }
    }

    // ── ML Predictions ──
    async function loadPredictions() {
        try {
            const res = await fetch(`${ANALYTICS}/predict/spikes`);
            const data = await res.json();
            const preds = data.all_predictions || [];

            document.getElementById('predictionList').innerHTML = preds.map(p => `
                <div class="spike-item ${p.spike_incoming ? '' : 'no-spike'}">
                    <span class="spike-badge ${p.spike_incoming ? '' : 'safe'}">${p.spike_incoming ? '🔥 SPIKE' : '✓ STABLE'}</span>
                    <div class="spike-video">${p.video_id.replace('.mp4','')}</div>
                    <div class="spike-detail">avg: ${p.current_avg_requests} → predicted: ${p.predicted_next_window} (${p.windows_analyzed} windows)</div>
                </div>
            `).join('') || '<span style="color:#555">Not enough data yet</span>';
            document.getElementById('predRefresh').textContent = `Updated: ${new Date().toLocaleTimeString()}`;
        } catch(e) { document.getElementById('predictionList').innerHTML = '<span style="color:#555">Error loading</span>'; }
    }

    // ── Analytics ──
    async function loadAnalytics() {
        try {
            const res = await fetch(`${ANALYTICS}/analytics/report`);
            const data = await res.json();
            const o = data.overall || {};

            document.getElementById('analyticsStats').innerHTML = `
                <div class="stat-box"><div class="stat-value">${o.total_requests || 0}</div><div class="stat-label">Total Requests</div></div>
                <div class="stat-box"><div class="stat-value">${o.overall_hit_rate_pct || 0}%</div><div class="stat-label">Cache Hit Rate</div></div>
                <div class="stat-box"><div class="stat-value">${o.avg_latency_ms || 0}ms</div><div class="stat-label">Avg Latency</div></div>
                <div class="stat-box"><div class="stat-value">${o.unique_videos || 0}</div><div class="stat-label">Unique Videos</div></div>
            `;
            document.getElementById('analyticsRefresh').textContent = `Updated: ${new Date().toLocaleTimeString()}`;
        } catch(e) { document.getElementById('analyticsStats').innerHTML = '<span style="color:#555">Error loading</span>'; }
    }

    // ── Pre-cache Log ──
    async function loadPrecacheLog() {
        try {
            const res = await fetch(`${CORE}/precache-log`);
            const data = await res.json();
            const events = data.precache_events || [];

            document.getElementById('precacheLog').innerHTML = events.length
                ? events.slice(-8).reverse().map(e => `
                    <div class="log-item">
                        <span>${e.timestamp}</span> — 
                        <span>${e.video_id}</span> → ${e.edge_id} 
                        <span style="color:${e.status === 'precached' ? '#4caf50' : '#8892b0'}">[${e.status}]</span>
                    </div>`).join('')
                : '<span style="color:#555; font-size:13px;">No pre-cache events yet. Wait for ML to detect a spike or use the Pre-cache Now button.</span>';
            document.getElementById('precacheRefresh').textContent = `Updated: ${new Date().toLocaleTimeString()}`;
        } catch(e) { document.getElementById('precacheLog').innerHTML = '<span style="color:#555">Error loading</span>'; }
    }

    // ── Video Player ──
    async function loadVideoList() {
        try {
            const res = await fetch(`${CORE}/videos`);
            const data = await res.json();
            document.getElementById('videoSelect').innerHTML = data.videos
                .map(v => `<option value="${v}">${v}</option>`).join('');
        } catch(e) {}
    }

    function loadVideo() {
        const videoId = document.getElementById('videoSelect').value;
        const player = document.getElementById('player');
        player.src = `${EDGE}/video/${videoId}`;
        player.load();
        player.play().catch(() => {});
        document.getElementById('playerStatus').textContent = `Loading ${videoId} via edge1... check Docker logs for HIT/MISS`;
    }

    async function triggerPrecache() {
        const videoId = document.getElementById('videoSelect').value;
        document.getElementById('playerStatus').textContent = `Triggering pre-cache for ${videoId}...`;
        try {
            const res = await fetch(`${CORE}/precache/trigger`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({video_id: videoId})
            });
            const data = await res.json();
            document.getElementById('playerStatus').textContent = `Pre-cache triggered! Check Pre-cache Events panel.`;
            loadPrecacheLog();
            loadEdgeStatus();
        } catch(e) {
            document.getElementById('playerStatus').textContent = `Error: ${e.message}`;
        }
    }

    // ── Refresh Everything ──
    function refreshAll() {
        loadEdgeStatus();
        loadPopularity();
        loadPredictions();
        loadAnalytics();
        loadPrecacheLog();
    }

    // Initial load
    loadVideoList();
    refreshAll();

    // Auto-refresh every 15 seconds
    setInterval(refreshAll, 15000);
</script>

</body>
</html>
