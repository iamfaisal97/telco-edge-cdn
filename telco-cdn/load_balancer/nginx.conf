# Configure events processing
events {
    worker_connections 1024;
}

# Configure HTTP server
http {
    # Define a group of upstream edge servers
    upstream edges {
        server edge1:5001;
        server edge2:5002;
        server edge3:5003;
    }

    # Configure the main server block
    server {
        listen 80;

        # All video requests go to the edge pool
        # Location block for video content
        location /video/ {
            proxy_pass http://edges;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            
            # These headers let you see WHICH edge served each request
            add_header X-Served-By $upstream_addr always;
        }

        # Location block for cache-index endpoint
        # Allow hitting individual edge cache-index endpoints through nginx too
        location /cache-index {
            proxy_pass http://edges;
        }

        # Location block for health check endpoint
        location /health {
            proxy_pass http://edges;
        }
    }
}